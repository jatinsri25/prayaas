# ═══════════════════════════════════════════════════════════════════════════════
# Prayaas — Production Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   cp .env.example .env   # fill in all values
#   docker compose -f docker-compose.prod.yml up -d
#
# Services: backend, frontend, nginx (reverse proxy), postgres, redis
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: prayaas-backend:${TAG:-latest}
    user: "1000:1000"
    read_only: true
    tmpfs: [/tmp]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      ENVIRONMENT:        production
      DATABASE_URL:       postgresql://${DB_USER:-prayaas_app}:${DB_PASSWORD}@db:5432/${DB_NAME:-prayaas}
      REDIS_URL:          redis://:${REDIS_PASSWORD}@redis:6379/0
      GOOGLE_API_KEY:     ${GOOGLE_API_KEY}
      JWT_PRIVATE_KEY:    ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY:     ${JWT_PUBLIC_KEY}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY}
      CORS_ORIGINS:       ${CORS_ORIGINS:-https://prayaas.app}
      DB_SSL_REQUIRE:     "false"  # internal docker network, TLS not needed
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.prayaas.app}
    image: prayaas-frontend:${TAG:-latest}
    user: "1001:1001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.prayaas.app}
    restart: unless-stopped

  # ── Nginx (Reverse Proxy + TLS) ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-prayaas}
      POSTGRES_USER:     ${DB_USER:-prayaas_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    command: >
      postgres
        -c log_connections=on
        -c log_disconnections=on
        -c log_statement=ddl
        -c shared_preload_libraries=pg_stat_statements
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-prayaas_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
