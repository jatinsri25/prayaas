# ═══════════════════════════════════════════════════════════════════════════════
# Prayaas — Nginx Production Configuration
# ═══════════════════════════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_anon:10m rate=20r/m;
limit_req_zone $http_authorization zone=api_auth:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=ai_zone:10m  rate=10r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── HTTP → HTTPS Redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── API Server (Backend) ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.prayaas.app;

        ssl_certificate     /etc/letsencrypt/live/api.prayaas.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.prayaas.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Block access to internal FastAPI docs
        location ~ ^/(docs|redoc|openapi\.json) {
            deny all;
            return 404;
        }

        # Block access to metrics (internal only)
        location /metrics {
            deny all;
            return 404;
        }

        # AI endpoints — tight rate limit
        location /api/v1/problems/process {
            limit_req zone=ai_zone burst=3 nodelay;
            limit_req_status 429;
            client_max_body_size 25m;
            proxy_pass http://backend:8000;
            proxy_read_timeout 120s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Authenticated API — moderate rate limit
        location /api/ {
            limit_req zone=api_auth burst=20 nodelay;
            limit_req_status 429;
            client_max_body_size 64k;
            proxy_pass http://backend:8000;
            proxy_read_timeout 30s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass http://backend:8000;
        }
    }

    # ── Frontend Server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name prayaas.app www.prayaas.app;

        ssl_certificate     /etc/letsencrypt/live/prayaas.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/prayaas.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
